name: alice_chat
description: Android-first OpenClaw chat client built on Flyer Chat.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_chat_core: ^2.0.0
  flutter_chat_ui: ^2.0.0
  http: ^1.2.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  webview_flutter: ^4.10.0
  uuid: ^4.5.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/avatars/alice.jpg
