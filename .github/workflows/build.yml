name: Build and Upload APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build debug APK
        run: flutter build apk --debug
      
      - name: Upload to Jianguoyun
        env:
          JIANGUOYUN_USER: ${{ secrets.JIANGUOYUN_USER }}
          JIANGUOYUN_PASSWORD: ${{ secrets.JIANGUOYUN_PASSWORD }}
        run: |
          curl -T build/app/outputs/flutter-apk/app-debug.apk \
            -u "$JIANGUOYUN_USER:$JIANGUOYUN_PASSWORD" \
            "https://dav.jianguoyun.com/dav/Alicechat/app-debug.apk"
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: alicechat-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
