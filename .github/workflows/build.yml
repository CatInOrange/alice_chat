name: Build and Upload APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build debug APK
        run: flutter build apk --debug

      - name: Compress APK
        run: |
          cd build/app/outputs/flutter-apk
          zip app-debug.apk.zip app-debug.apk
          echo "Compressed size: $(du -h app-debug.apk.zip | cut -f1)"

      - name: Setup COS CLI
        run: |
          pip install cos-python-sdk-v5
      - name: Upload to Tencent COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          python3 << 'EOF'
          import os
          from qcloud_cos import CosConfig
          from qcloud_cos import CosS3Client
          import logging

          logging.basicConfig(level=logging.INFO, stream=__import__('sys').stdout)

          config = CosConfig(
              Region=os.environ['COS_REGION'],
              SecretId=os.environ['COS_SECRET_ID'],
              SecretKey=os.environ['COS_SECRET_KEY'],
              Token=None,
              Scheme='https'
          )
          client = CosS3Client(config)

          local_file = 'build/app/outputs/flutter-apk/app-debug.apk.zip'
          cos_path = 'apk/app-debug.apk.zip'

          print(f'Uploading {local_file} to cos://{os.environ["COS_BUCKET"]}/{cos_path}')
          client.upload_file(
              Bucket=os.environ['COS_BUCKET'],
              LocalFilePath=local_file,
              Key=cos_path,
              PartSize=10,
              MAXThread=10
          )
          print('Upload complete!')
          print(f'COS URL: https://{os.environ["COS_BUCKET"]}.cos.{os.environ["COS_REGION"]}.myqcloud.com/{cos_path}')
          EOF
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: alicechat-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
