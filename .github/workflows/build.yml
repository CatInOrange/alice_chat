name: Build and Upload APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Restore Android signing files
        env:
          KEYSTORE_BASE64: ${{ secrets.ALICECHAT_UPLOAD_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ALICECHAT_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALICECHAT_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ALICECHAT_UPLOAD_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.p12
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.p12
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-pub-

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk
          key: ndk-27.0.12077973

      - name: Cache CMake
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/cmake
          key: cmake-3.22.1

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/android/*.gradle*', '**/android/app/build.gradle*') }}
          restore-keys: |
            gradle-

      - name: Cache Flutter build artifacts
        uses: actions/cache@v4
        with:
          path: ~/.flutter-devtools
          key: flutter-artifacts-${{ runner.os }}

      - name: Build release APK
        run: flutter build apk --release

      - name: Compress APK
        run: |
          cd build/app/outputs/flutter-apk
          zip app-release.apk.zip app-release.apk
          echo "Compressed size: $(du -h app-release.apk.zip | cut -f1)"

      - name: Setup COS CLI
        run: |
          pip install cos-python-sdk-v5

      - name: Upload to Tencent COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          python3 << 'EOF'
          import os
          import time
          import logging
          from qcloud_cos import CosConfig
          from qcloud_cos import CosS3Client
          from qcloud_cos.cos_exception import CosClientError, CosServiceError

          logging.basicConfig(level=logging.INFO, stream=__import__('sys').stdout)
          logger = logging.getLogger()

          config = CosConfig(
              Region=os.environ['COS_REGION'],
              SecretId=os.environ['COS_SECRET_ID'],
              SecretKey=os.environ['COS_SECRET_KEY'],
              Token=None,
              Scheme='https',
              Timeout=600
          )
          client = CosS3Client(config)

          local_file = 'build/app/outputs/flutter-apk/app-release.apk.zip'
          cos_path = 'apk/app-release.apk.zip'

          def upload_with_retry(client, bucket, local_file, cos_path, max_retries=3):
              for attempt in range(max_retries):
                  try:
                      logger.info(f'Upload attempt {attempt + 1}/{max_retries}')
                      logger.info(f'Uploading {local_file} to cos://{bucket}/{cos_path}')
                      client.upload_file(
                          Bucket=bucket,
                          LocalFilePath=local_file,
                          Key=cos_path,
                          PartSize=20,
                          MAXThread=20
                      )
                      logger.info('Upload complete!')
                      return True
                  except (CosClientError, CosServiceError, Exception) as e:
                      logger.warning(f'Attempt {attempt + 1} failed: {e}')
                      if attempt < max_retries - 1:
                          wait = (attempt + 1) * 30
                          logger.info(f'Retrying in {wait}s...')
                          time.sleep(wait)
              return False

          bucket = os.environ['COS_BUCKET']
          success = upload_with_retry(client, bucket, local_file, cos_path)

          if success:
              print(f'COS URL: https://{bucket}.cos.{os.environ["COS_REGION"]}.myqcloud.com/{cos_path}')
          else:
              logger.error('Upload failed after all retries')
              exit(1)
          EOF
        continue-on-error: true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: alicechat-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
